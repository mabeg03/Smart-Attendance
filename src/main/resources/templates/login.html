<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="/css/dashboard.css">
<style>
.login-box {
    width: 400px;
    margin: 100px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}
button { margin-top: 10px; }
</style>
</head>
<body>

<div class="login-box">

<h2>Smart Attendance Login</h2>

<h3>Student Login</h3>
<form action="/student-login" method="post">
<input name="email" placeholder="Email" required>
<input name="password" type="password" placeholder="Password" required>
<button class="primary" type="submit">Login as Student</button>
</form>

<hr>

<h3>Teacher Login</h3>
<form action="/teacher-login" method="post">
<input name="email" placeholder="Email" required>
<input name="password" type="password" placeholder="Password" required>
<button class="primary" type="submit">Login as Teacher</button>
</form>

</div>

</body>
</html>
